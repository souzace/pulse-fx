services:
  database:
    image: postgres:15-alpine
    env_file:
      - ./apps/backend/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DATABASE"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    working_dir: /app/apps/backend
    volumes:
      - .:/app
    ports:
      - "3333:3333"
    env_file:
      - ./apps/backend/.env
    command: sh -c "npm install && npm run build && npm run migrate:up && npm run dev"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3333/v1/indicators || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    image: node:20-alpine
    working_dir: /app/apps/frontend
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    env_file:
      - ./apps/frontend/.env
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata: